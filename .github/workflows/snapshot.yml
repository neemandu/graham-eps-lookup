name: Quarterly snapshot

on:
  # Run daily at 11:00 UTC. The script self-limits: it only appends a snapshot
  # when a ticker reports a NEW quarter, so a daily run is cheap and idempotent.
  schedule:
    - cron: '0 11 * * *'
  # Manual run button in the Actions tab.
  workflow_dispatch:

# Allow the default GITHUB_TOKEN to commit the updated data/ files back.
permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Runs in LOCAL (file) mode — no GITHUB_TOKEN env set for this step — so it
      # writes data/history/*.json on disk for the commit step below to pick up.
      - name: Capture snapshots
        run: node scripts/snapshot.js

      - name: Commit snapshot changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --staged --quiet || git commit -m "data: quarterly snapshot [skip ci]"
          git push
